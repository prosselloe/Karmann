name: karmann
description: "Karmann Models"
publish_to: 'none'
version: 1.0.0+12

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  provider: ^6.1.2
  google_fonts: ^6.2.1
  go_router: ^14.1.0
  path_provider: any # Deixem que Flutter gestioni la versió
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true # Activem la generació de codi de localització
  assets:
    - assets/images/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
